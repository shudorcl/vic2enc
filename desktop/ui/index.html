<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vic2 编码转换工具</title>
  <style>
    :root {
      --bg: #1e2127;
      --panel: #282c34;
      --border: #3b4048;
      --accent: #61afef;
      --accent-hover: #4d9be0;
      --text: #d7dae0;
      --muted: #8b919c;
      --ok: #98c379;
      --err: #e06c75;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px; margin-bottom: 16px;
    }
    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .row:last-child { margin-bottom: 0; }
    label.field { width: 92px; color: var(--muted); flex: none; }
    input[type=text] {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 10px; min-width: 0;
    }
    button {
      background: var(--border); color: var(--text); border: none;
      border-radius: 6px; padding: 8px 14px; cursor: pointer; white-space: nowrap;
    }
    button:hover { background: #4a505a; }
    button.primary { background: var(--accent); color: #11151c; font-weight: 600; }
    button.primary:hover { background: var(--accent-hover); }
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .seg button { border-radius: 0; background: var(--bg); }
    .seg button.active { background: var(--accent); color: #11151c; font-weight: 600; }
    .opts { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .opts label { color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
    .actions { display: flex; gap: 10px; align-items: center; }
    #status { font-size: 13px; }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    pre {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; max-height: 220px; overflow: auto; white-space: pre-wrap;
      word-break: break-all; margin: 0; font-family: "Cascadia Code", Consolas, monospace; font-size: 12.5px;
    }
    .hint { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Vic2 编码转换工具</h1>
  <div class="sub">维多利亚2 本地化 CSV：游戏格式 (GBK 伪 Latin-1) ⇄ 可读 UTF-8</div>

  <div class="card">
    <div class="row">
      <label class="field">方向</label>
      <div class="seg" id="dir">
        <button data-dir="to_unicode" class="active">解码 · 游戏 → 可读</button>
        <button data-dir="to_game">编码 · 可读 → 游戏</button>
      </div>
    </div>
    <div class="row">
      <label class="field">输入</label>
      <input type="text" id="input" placeholder="选择一个 .csv 文件或 localisation 文件夹" />
      <button id="pickInputFile">文件</button>
      <button id="pickInputDir">文件夹</button>
    </div>
    <div class="row">
      <label class="field">输出</label>
      <input type="text" id="output" placeholder="输出文件或文件夹（文件夹将保留目录结构）" />
      <button id="pickOutputFile">文件</button>
      <button id="pickOutputDir">文件夹</button>
    </div>
    <div class="row opts">
      <label><input type="checkbox" id="safeTokens" checked /> Safe-token（保护 $变量$ / §£¤）</label>
      <label>编码
        <select id="codepage"><option value="gbk">GBK · 简体中文</option></select>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="actions">
      <button class="primary" id="run">开始转换</button>
      <button id="previewBtn">预览输入</button>
      <span id="status"></span>
    </div>
    <pre id="preview" style="margin-top:14px; display:none;"></pre>
    <div class="hint">
      提示：游戏读取 cp1252，中文以 GBK 字节伪装成 Latin-1 存储，需配合自定义字体显示。<br />
      解码后得到可读 UTF-8 便于编辑/翻译；编辑完成后再编码回游戏格式覆盖原文件。
    </div>
  </div>

  <script>
    const T = window.__TAURI__;
    const invoke = T.core.invoke;
    const dialog = T.dialog;

    const $ = (id) => document.getElementById(id);
    let direction = "to_unicode";

    document.querySelectorAll("#dir button").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll("#dir button").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        direction = b.dataset.dir;
      });
    });

    async function pickFile(target) {
      const sel = await dialog.open({ multiple: false, directory: false, filters: [{ name: "CSV", extensions: ["csv"] }] });
      if (sel) $(target).value = sel;
    }
    async function pickDir(target) {
      const sel = await dialog.open({ multiple: false, directory: true });
      if (sel) $(target).value = sel;
    }
    async function pickSave() {
      const sel = await dialog.save({ filters: [{ name: "CSV", extensions: ["csv"] }] });
      if (sel) $("output").value = sel;
    }

    $("pickInputFile").addEventListener("click", () => pickFile("input"));
    $("pickInputDir").addEventListener("click", () => pickDir("input"));
    $("pickOutputFile").addEventListener("click", pickSave);
    $("pickOutputDir").addEventListener("click", () => pickDir("output"));

    function setStatus(msg, cls) {
      const s = $("status");
      s.textContent = msg;
      s.className = cls || "";
    }

    function params() {
      return {
        input: $("input").value.trim(),
        output: $("output").value.trim(),
        direction,
        codepage: $("codepage").value,
        safeTokens: $("safeTokens").checked,
      };
    }

    $("run").addEventListener("click", async () => {
      setStatus("转换中…");
      try {
        const res = await invoke("convert", { req: params() });
        setStatus(`完成：${res.message}`, "ok");
      } catch (e) {
        setStatus(`失败：${e}`, "err");
      }
    });

    $("previewBtn").addEventListener("click", async () => {
      const p = params();
      if (!p.input) { setStatus("请先选择输入文件", "err"); return; }
      setStatus("生成预览…");
      try {
        const text = await invoke("preview", {
          input: p.input, direction: p.direction,
          codepage: p.codepage, safeTokens: p.safeTokens, maxBytes: 4096,
        });
        const pre = $("preview");
        pre.style.display = "block";
        pre.textContent = text || "(空)";
        setStatus("预览已更新（前 4 KB）", "ok");
      } catch (e) {
        setStatus(`预览失败：${e}`, "err");
      }
    });
  </script>
</body>
</html>
